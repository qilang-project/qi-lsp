name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # qi-lsp depends on qi-compiler which links LLVM 15 via inkwell.
      - name: Install LLVM 15 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential lsb-release wget software-properties-common gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 15
          echo "LLVM_SYS_150_PREFIX=/usr/lib/llvm-15" >> $GITHUB_ENV

      - name: Install LLVM 15 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@15
          echo "LLVM_SYS_150_PREFIX=$(brew --prefix llvm@15)" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --release --verbose

      - name: Initialize smoke test
        # End-to-end: drive LSP via stdio with initialize/exit; confirm
        # capability negotiation returns server info without panic.
        shell: bash
        run: |
          python3 - <<'PY'
          import json, subprocess
          def msg(d):
              body = json.dumps(d)
              return f"Content-Length: {len(body)}\r\n\r\n{body}"
          init = {"jsonrpc":"2.0","id":1,"method":"initialize",
                  "params":{"processId":None,"rootUri":None,
                            "capabilities":{"general":{"positionEncodings":["utf-8","utf-16"]}}}}
          exitn = {"jsonrpc":"2.0","method":"exit","params":None}
          p = subprocess.Popen(["./target/release/qi-lsp"],
                               stdin=subprocess.PIPE,
                               stdout=subprocess.PIPE,
                               stderr=subprocess.PIPE)
          out, err = p.communicate((msg(init) + msg(exitn)).encode(), timeout=15)
          assert b"Qi Language Server" in out, f"missing server info: {out[:500]}"
          assert b"positionEncoding" in out, f"missing capability: {out[:500]}"
          print("smoke ok")
          PY

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
